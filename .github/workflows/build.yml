name: Build Python 3.14.5 for iOS rootless and RootHide

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: [self-hosted, macOS, ARM64, python3145-mac-mini]
    timeout-minutes: 45
    env:
      PY_VER: 3.14.5
      LIBFFI_VER: 3.4.4
      OPENSSL_VER: 3.2.3
      XZ_VER: 5.6.4
      BZ2_VER: 1.0.8
      ZSTD_VER: 1.5.6
      NCURSES_VER: "6.5"
      GDBM_VER: "1.24"
      MIN_IOS: "15.0"
      DEVELOPER_DIR: /Applications/Xcode-16.4.0.app/Contents/Developer

    steps:
      - name: Checkout
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euxo pipefail
          git init .
          git remote remove origin 2>/dev/null || true
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git fetch --no-tags --prune --depth=1 origin "${GITHUB_SHA}"
          git checkout --force FETCH_HEAD
          git clean -ffdx -e work/deps/

      - name: Configure Mac mini toolchain
        run: |
          echo "/opt/homebrew/bin" >> "$GITHUB_PATH"
          echo "/opt/homebrew/sbin" >> "$GITHUB_PATH"
          /opt/homebrew/bin/brew --version
          /opt/homebrew/bin/python3.14 --version
          xcrun --sdk iphoneos --show-sdk-version

      - name: Discover SDK version
        id: sdk
        run: |
          echo "version=$(xcrun --sdk iphoneos --show-sdk-version)" >> "$GITHUB_OUTPUT"

      - name: Install build tools
        run: |
          bash scripts/install-build-tools.sh

      - name: Build dependencies
        run: |
          set -euxo pipefail
          bash scripts/build-openssl.sh
          bash scripts/build-libffi.sh
          bash scripts/build-xz.sh
          bash scripts/build-bzip2.sh
          bash scripts/build-zstd.sh
          bash scripts/build-ncurses.sh
          bash scripts/build-gdbm.sh

      - name: Build Python 3.14 for iOS
        env:
          PYTHON_FOR_BUILD: /opt/homebrew/bin/python3.14
        run: |
          set -euxo pipefail
          bash scripts/build-python.sh

      - name: Package .deb
        run: |
          set -euxo pipefail
          bash scripts/package-dpkg.sh

      - name: Save artifacts on Mac mini
        run: |
          set -euxo pipefail
          ARTIFACT_DIR="/Users/tgm/actions-runner-python3145/artifacts/python3.14.5-ios/${GITHUB_RUN_ID}"
          rm -rf "$ARTIFACT_DIR"
          mkdir -p "$ARTIFACT_DIR"
          cp "work/com.korboy.python314_${PY_VER}_iphoneos-arm64.deb" "$ARTIFACT_DIR/"
          cp "work/com.korboy.python314_${PY_VER}_iphoneos-arm64e.deb" "$ARTIFACT_DIR/"
          shasum -a 256 "$ARTIFACT_DIR"/*.deb
